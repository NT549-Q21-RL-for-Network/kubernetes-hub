apiVersion: chaos-mesh.org/v1alpha1 # Chaos Mesh CRD API version.
kind: StressChaos # Chaos type that injects CPU/Memory stress.
metadata:
  name: product-service-cpu-stress # Unique name of this StressChaos resource.
  namespace: mini-ecommerce # Namespace where Chaos resource is created.
spec:
  mode: all # Apply stress to all selected target pods.
  selector:
    namespaces:
      - mini-ecommerce # Namespace scope for selecting target pods.
    labelSelectors:
      app: product-service # Target pods with app=product-service label.
  stressors:
    cpu:
      workers: 2 # Number of CPU worker threads used by stress-ng.
      load: 80 # CPU load percentage per worker.
  duration: "60s" # Keep chaos active for 60 seconds.
