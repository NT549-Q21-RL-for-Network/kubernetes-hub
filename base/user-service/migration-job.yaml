apiVersion: batch/v1
kind: Job
metadata:
  name: user-service-migrate
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        app: user-service-migrate
    spec:
      serviceAccountName: user-service
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: tienphatng237/mini-ecommerce-user-service
          imagePullPolicy: Always
          command: ["./user-service"]
          args: ["migrate"]
          env:
            - name: DB_HOST
              value: user-db
            - name: DB_PORT
              value: "5432"
          envFrom:
            - secretRef:
                name: user-db-secret
